<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparativo com Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #f2f2f2; }
.painel { margin-top: 30px; }
</style>

</head>
<body>

<h2>Comparativo Hidráulica</h2>

<label>Dólar: </label>
<input type="number" id="dolar" value="5.2" step="0.01" oninput="calcularTudo()">

<button onclick="adicionarItem()">+ Item</button>
<button onclick="salvar()">💾 Salvar cenário</button>
<button onclick="gerarGrafico()">📊 Atualizar gráfico</button>

<div id="container"></div>

<div class="painel">
  <h3>Evolução de Preço</h3>
  <canvas id="grafico"></canvas>
</div>

<script>

function adicionarItem() {
  document.getElementById("container").innerHTML += `
    <div class="item-box">
      <input placeholder="Nome do Item"><br><br>
      <button onclick="adicionarLinha(this)">+ Fornecedor</button>
      <table>
        <tr>
          <th>Fornecedor</th>
          <th>Tipo</th>
          <th>Preço</th>
          <th>Frete</th>
          <th>Custo</th>
        </tr>
        <tbody></tbody>
      </table>
    </div>
  `;
}

function adicionarLinha(btn) {
  let tbody = btn.parentElement.querySelector("tbody");

  tbody.innerHTML += `
    <tr>
      <td><input></td>
      <td>
        <select onchange="calcularTudo()">
          <option value="importado">Importado</option>
          <option value="nacional">Nacional</option>
        </select>
      </td>
      <td><input type="number" class="preco" oninput="calcularTudo()"></td>
      <td><input type="number" class="frete" oninput="calcularTudo()"></td>
      <td class="custo">-</td>
    </tr>
  `;
}

function calcularTudo() {
  let dolar = parseFloat(document.getElementById("dolar").value) || 0;

  document.querySelectorAll(".item-box").forEach(box => {
    box.querySelectorAll("tbody tr").forEach(linha => {
      let tipo = linha.querySelector("select").value;
      let preco = parseFloat(linha.querySelector(".preco").value) || 0;
      let frete = parseFloat(linha.querySelector(".frete").value) || 0;

      let total = tipo === "importado"
        ? (preco * dolar) * 1.6 * 1.18 + frete
        : preco + frete;

      linha.querySelector(".custo").innerText = total.toFixed(2);
    });
  });
}

function coletarDados() {
  let dados = [];

  document.querySelectorAll(".item-box").forEach(box => {
    let nome = box.querySelector("input").value;

    box.querySelectorAll("tbody tr").forEach(linha => {
      dados.push({
        item: nome,
        custo: parseFloat(linha.querySelector(".custo").innerText) || 0
      });
    });
  });

  return dados;
}

function salvar() {
  let historico = JSON.parse(localStorage.getItem("historico") || "[]");

  historico.push({
    data: new Date().toLocaleString(),
    dados: coletarDados()
  });

  localStorage.setItem("historico", JSON.stringify(historico));

  alert("Salvo!");
}

let chart;

function gerarGrafico() {
  let historico = JSON.parse(localStorage.getItem("historico") || "[]");

  if (historico.length === 0) return;

  let labels = historico.map(h => h.data);

  let dados = historico.map(h => {
    let soma = h.dados.reduce((acc, d) => acc + d.custo, 0);
    return soma;
  });

  let ctx = document.getElementById("grafico").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Custo Total",
        data: dados,
        borderWidth: 2
      }]
    }
  });
}

// inicial
adicionarItem();

</script>

</body>
</html>
