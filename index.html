<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparativo de Fornecedores</title>

<style>
  body { font-family: Arial; padding: 20px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #f2f2f2; }
  .melhor { background-color: #c8f7c5; }
</style>

</head>
<body>

<h2>Comparativo Hidráulica</h2>

<label>Dólar: </label>
<input type="number" id="dolar" value="5.2" step="0.01">

<button onclick="adicionarLinha()">+ Fornecedor</button>

<table id="tabela">
  <thead>
    <tr>
      <th>Item</th>
      <th>Fornecedor</th>
      <th>Tipo</th>
      <th>Preço</th>
      <th>Frete</th>
      <th>Custo Final</th>
      <th>Dif (%)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

function adicionarLinha() {
  let tabela = document.querySelector("#tabela tbody");

  let linha = `
    <tr>
      <td><input value="Registro 1/2"></td>
      <td><input></td>
      <td>
        <select onchange="calcular()">
          <option value="importado">Importado</option>
          <option value="nacional">Nacional</option>
        </select>
      </td>
      <td><input type="number" class="preco" oninput="calcular()"></td>
      <td><input type="number" class="frete" oninput="calcular()"></td>
      <td class="custo">-</td>
      <td class="dif">-</td>
    </tr>
  `;

  tabela.innerHTML += linha;
}

function calcular() {
  let dolar = parseFloat(document.getElementById("dolar").value) || 0;
  let imposto = 0.6;
  let icms = 0.18;

  let linhas = document.querySelectorAll("#tabela tbody tr");
  let custos = [];

  linhas.forEach((linha) => {
    let tipo = linha.querySelector("select").value;
    let preco = parseFloat(linha.querySelector(".preco").value) || 0;
    let frete = parseFloat(linha.querySelector(".frete").value) || 0;

    let total = 0;

    if (tipo === "importado") {
      let precoBRL = preco * dolar;
      let imp = precoBRL * imposto;
      let icmsValor = (precoBRL + imp) * icms;
      total = precoBRL + imp + icmsValor + frete;
    } else {
      total = preco + frete;
    }

    linha.querySelector(".custo").innerText = total.toFixed(2);
    custos.push(total);
  });

  let menor = Math.min(...custos);

  linhas.forEach((linha) => {
    let custo = parseFloat(linha.querySelector(".custo").innerText);

    linha.classList.remove("melhor");

    if (custo === menor) {
      linha.classList.add("melhor");
    }

    let dif = ((custo - menor) / menor) * 100;
    linha.querySelector(".dif").innerText = dif.toFixed(1) + "%";
  });
}

// inicia com 3 linhas
for (let i = 0; i < 3; i++) adicionarLinha();

</script>

</body>
</html>
